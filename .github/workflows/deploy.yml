name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main  # main 브랜치에 푸시될 때 트리거

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 코드 체크아웃
    - name: Checkout repository
      uses: actions/checkout@v2

    # JDK 17 설정
    - name: Set up JDK 17
      uses: actions/setup-java@v1
      with:
        java-version: '17'

    # gradlew 권한 설정
    - name: Set gradlew permissions
      run: |
        chmod +x ./gradlew

    # gradle 빌드 (직접 경로 및 환경 변수 사용)
    - name: Build with Gradle
      run: |
        # 1. 파일이 있는지 위치를 강제로 확인
        ls -l $GITHUB_WORKSPACE/gradle/wrapper/gradle-wrapper.jar
        
        # 2. 래퍼 스크립트를 직접 실행하지 않고, 자바 명령어로 jar를 직접 호출
        java -jar $GITHUB_WORKSPACE/gradle/wrapper/gradle-wrapper.jar build
      
    - name: Set SSH key permissions
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519

    - name: Add SSH key
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}


    - name: Add known_hosts
      run: |
        ssh-keyscan -H ed25519 54.180.29.19 >> ~/.ssh/known_hosts

    #- name: 기존프로세스 종료
    #  run: |
    #    kill -9 $(ps -ef | grep devops | grep -v grep | head -n 1 | awk '{print $2}') || true

    - name: Deploy to Server with rsync
      run: | 
         rsync -avz -e "ssh -o StrictHostKeyChecking=no" build/libs/*.jar ubuntu@54.180.29.19:~/app


    - name: Run SSH commands
      run: |
        ssh -i ~/.ssh/id_ed25519 ubuntu@54.180.29.19 << 'EOF'
          pkill -f 'java -jar' || true
          nohup java -jar ~/app/jenkins-0.0.1-SNAPSHOT.jar > log.txt 2>&1 &
        EOF
