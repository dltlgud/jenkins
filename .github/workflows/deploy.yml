name: Deploy with DockerHub to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set gradlew permissions
        run: chmod +x ./gradlew
       
      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-jenkins:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-jenkins:latest

      # --- 여기서부터 SSH 접속 및 배포 설정 수정 ---
      - name: Setup SSH and Deploy
        run: |
          # 1. SSH 키 설정 (가장 확실한 파일 생성 방식)
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # 서버 IP 등록
          ssh-keyscan -H 54.180.29.19 >> ~/.ssh/known_hosts

          # 2. SSH 접속 및 명령어 실행
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ubuntu@54.180.29.19 << 'EOF'
            # 9090 포트를 사용하는 모든 프로세스 강제 종료 (Docker 외 프로세스 포함)
            sudo fuser -k 9090/tcp || true
            
            # 기존 컨테이너 정리
            docker stop spring-jenkins || true
            docker rm spring-jenkins || true
            
            # 최신 이미지 반영 및 실행
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/spring-jenkins:latest
            docker run -d --name spring-jenkins -p 9090:9090 ${{ secrets.DOCKERHUB_USERNAME }}/spring-jenkins:latest
          EOF
